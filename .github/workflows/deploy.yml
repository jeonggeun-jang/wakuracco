# main 브랜치에 푸시하면 Flutter 웹(wasm) 빌드 후 GitHub Pages로 자동 배포한다.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Actions 탭에서 수동 실행도 가능

permissions:
  contents: read
  pages: write
  id-token: write

# 배포가 겹치면 이전 실행을 취소하고 최신 것만 진행
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0
          cache: true

      - name: 의존성 설치
        run: flutter pub get

      - name: 정적 분석
        run: flutter analyze

      - name: 테스트
        run: flutter test

      # base-href는 저장소 이름에서 자동으로 따온다 (예: /wakuracco/)
      - name: 웹 빌드 (wasm)
        run: flutter build web --wasm --base-href "/${{ github.event.repository.name }}/"

      # flutter.js.map은 빌드에 포함되지 않아 참조가 404를 일으키므로 제거
      # (Lighthouse Best Practices 감점 방지)
      - name: 소스맵 참조 제거
        run: sed -i 's|^//# sourceMappingURL=.*||' build/web/flutter_bootstrap.js

      - name: Pages 설정
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 빌드 결과 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pages에 배포
        id: deployment
        uses: actions/deploy-pages@v4
